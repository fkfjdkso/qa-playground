services:
  db:
    image: postgres:16-alpine
    container_name: qa_playground_db
    environment:
      - POSTGRES_USER=qa_user
      - POSTGRES_PASSWORD=qa_password
      - POSTGRES_DB=qa_playground
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U qa_user -d qa_playground" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web_app:
    build: .
    container_name: qa_playground_app
    ports:
      - "8000:8000"
    environment:
      - USER=qa_user
      - PASSWORD=qa_password
      - HOST=db
      - PORT=5432
      - DBNAME=qa_playground
      - LOCAL_DB=True
    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=2)" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
volumes:
  pgdata:
